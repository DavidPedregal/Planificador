services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  # ── Python planning microservice ───────────────────────────────────────────
  algoritmo:
    build: ./planificadorAlgoritmo
    ports:
      - "8001:8001"

  # ── Express backend ────────────────────────────────────────────────────────
  back:
    build: ./planificadorBack
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - algoritmo
    environment:
      PORT: 8000
      MONGO_URI: mongodb://mongo:27017/planificador
      PLANNER_URL: http://algoritmo:8001
      CORS_ORIGIN: http://mentiplan.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}

  # ── Next.js frontend ───────────────────────────────────────────────────────
  front:
    build:
      context: ./papp
      args:
        NEXT_PUBLIC_URL_BACK: http://mentiplan.com/api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - back

volumes:
  mongo_data: